                { question: "Q194. Which prophet is known for his strength and bravery, and his story is mentioned in the context of the Battle of Badr?", options: ["Prophet Muhammad (PBUH)", "Prophet Musa (Moses)", "Prophet Dawud (David)", "Prophet Yusuf (Joseph)"], correct: 0 },
                { question: "Q195. What is the name of the chapter in the Quran that focuses on the rules of family and inheritance?", options: ["Surah An-Nisa", "Surah Al-Baqarah", "Surah Al-Ma'idah", "Surah Al-Hujurat"], correct: 0 },
                { question: "Q196. What is the Arabic term for the act of asking Allah for help and guidance?", options: ["Dua", "Sadaqah", "Tawbah", "Sawm"], correct: 0 },
                { question: "Q197. What is the Arabic term for the act of fasting during the month of Ramadan?", options: ["Sawm", "Sadaqah", "Zakat", "Hajj"], correct: 0 },
                { question: "Q198. What is the name of the chapter in the Quran that is known for its focus on the stories of the prophets?", options: ["Surah Anbiya", "Surah Al-Baqarah", "Surah Al-Imran", "Surah Al-Kahf"], correct: 0 },
                { question: "Q199. What is the Arabic term for the community of Muslims worldwide?", options: ["Ummah", "Jama'ah", "Ahl", "Muwahhid"], correct: 0 },
                { question: "Q200. What is the Arabic term for the collection of religious knowledge and jurisprudence derived from the Quran and Hadith?", options: ["Fiqh", "Sharia", "Sunnah", "Hadith"], correct: 0 }
            ];

            const TOTAL_QUESTIONS = questions.length;
            let questionsIndices = [];          // array of indices for random order
            let currentIndex = 0;
            let score = 0;
            let answered = false;
            let currentLang = 'en';
            let darkMode = false;

            // DOM elements
            const quizArea = document.getElementById('quizArea');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const currentQNumSpan = document.getElementById('currentQNum');
            const totalQSpan = document.getElementById('totalQ');
            const progressFill = document.getElementById('progressFill');
            const languageSelect = document.getElementById('languageSelect');
            const themeToggle = document.getElementById('themeToggle');
            const themeLabel = document.getElementById('themeLabel');
            const scoreLabelSpan = document.getElementById('scoreLabel');
            const headerQuestionsLabel = document.getElementById('headerQuestionsLabel');
            const bodyEl = document.body;

            totalQSpan.textContent = TOTAL_QUESTIONS;

            function generateRandomIndices() {
                const indices = [];
                for (let i = 0; i < TOTAL_QUESTIONS; i++) {
                    indices.push(i); // use original order (or random: Math.floor(Math.random() * TOTAL_QUESTIONS))
                }
                // shuffle to make it random (Fisher-Yates)
                for (let i = indices.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [indices[i], indices[j]] = [indices[j], indices[i]];
                }
                return indices;
            }

            function updateUILanguage() {
                const ui = uiStrings[currentLang] || uiStrings.en;
                scoreLabelSpan.textContent = ui.score;
                headerQuestionsLabel.textContent = ui.headerQuestions;
                themeLabel.textContent = darkMode ? ui.themeLight : ui.themeDark;
            }

            function initQuiz() {
                questionsIndices = generateRandomIndices();
                currentIndex = 0;
                score = 0;
                answered = false;
                updateScore();
                renderQuestion();
                updateUILanguage();
            }

            function updateScore() {
                scoreDisplay.textContent = score;
            }

            function renderQuestion() {
                if (currentIndex >= TOTAL_QUESTIONS) {
                    showResultScreen();
                    return;
                }

                const baseIdx = questionsIndices[currentIndex];
                const q = questions[baseIdx];

                currentQNumSpan.textContent = currentIndex + 1;
                const progressPercent = ((currentIndex + 1) / TOTAL_QUESTIONS) * 100;
                progressFill.style.width = progressPercent + '%';

                const ui = uiStrings[currentLang] || uiStrings.en;
                const nextText = ui.next;
                const restartText = ui.restart;

                let html = `
                    <div class="question-text">${q.question}</div>
                    <div class="options-grid" id="optionsGrid">
                `;

                q.options.forEach((opt, idx) => {
                    html += `
                        <div class="option-btn" data-opt-index="${idx}">
                            <i class="fas fa-circle"></i> ${opt}
                        </div>
                    `;
                });

                html += `</div>`;
                html += `<button class="next-btn" id="nextBtn" disabled><i class="fas fa-arrow-right"></i> ${nextText}</button>`;
                html += `<button class="restart-btn" id="restartBtn"><i class="fas fa-rotate-right"></i> ${restartText}</button>`;

                quizArea.innerHTML = html;

                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.addEventListener('click', optionClickHandler);
                });
                document.getElementById('nextBtn').addEventListener('click', nextHandler);
                document.getElementById('restartBtn').addEventListener('click', () => initQuiz());

                answered = false;
            }

            function optionClickHandler(e) {
                if (answered) return;
                const btn = e.currentTarget;
                const optIndex = parseInt(btn.dataset.optIndex, 10);
                const baseIdx = questionsIndices[currentIndex];
                const correctIdx = questions[baseIdx].correct;

                document.querySelectorAll('.option-btn').forEach(b => b.classList.add('disabled'));

                if (optIndex === correctIdx) {
                    btn.classList.add('correct');
                    score++;
                    updateScore();
                } else {
                    btn.classList.add('wrong');
                    document.querySelectorAll('.option-btn').forEach(b => {
                        if (parseInt(b.dataset.optIndex) === correctIdx) {
                            b.classList.add('correct');
                        }
                    });
                }
                answered = true;
                document.getElementById('nextBtn').disabled = false;
            }

            function nextHandler() {
                if (!answered) return;
                if (currentIndex < TOTAL_QUESTIONS - 1) {
                    currentIndex++;
                    answered = false;
                    renderQuestion();
                } else {
                    showResultScreen();
                }
            }

            function showResultScreen() {
                const ui = uiStrings[currentLang] || uiStrings.en;
                const restartText = ui.restart;
                const completed = ui.completed;
                const correctAns = ui.correctAnswers;
                const correctly = ui.correctly;
                const html = `
                    <div class="result-box">
                        <h3><i class="fas fa-trophy"></i> ${completed}</h3>
                        <p style="font-size: 48px; font-weight:800; color:#1b6e3d;">${score}/${TOTAL_QUESTIONS}</p>
                        <p style="margin: 20px 0;">${correctAns} ${score} ${correctly}</p>
                    </div>
                    <button class="restart-btn" id="restartBtnFinal"><i class="fas fa-rotate-right"></i> ${restartText}</button>
                `;
                quizArea.innerHTML = html;
                document.getElementById('restartBtnFinal').addEventListener('click', () => initQuiz());
                currentQNumSpan.textContent = TOTAL_QUESTIONS;
                progressFill.style.width = '100%';
            }

            languageSelect.addEventListener('change', (e) => {
                currentLang = e.target.value;
                if (currentLang === 'ar' || currentLang === 'ur') {
                    bodyEl.classList.add('rtl');
                } else {
                    bodyEl.classList.remove('rtl');
                }
                updateUILanguage();
                renderQuestion();  // re-render to update button texts
            });

            themeToggle.addEventListener('click', () => {
                darkMode = !darkMode;
                bodyEl.classList.toggle('dark-theme', darkMode);
                updateUILanguage();
            });

            // initial load
            initQuiz();
            languageSelect.value = 'en';
            bodyEl.classList.remove('rtl', 'dark-theme');
        })();
    </script>
</body>
</html>
